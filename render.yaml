services:
  - type: web
    name: ecg-demo
    env: python
    pythonVersion: 3.13.12
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn demo.app:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PORT
        value: 10000
        type: secret
