name: Build & Deploy to Fly (GHCR image)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ toLower(github.repository_owner) }}/ecg-demo:${{ github.sha }}

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          sudo mv ~/.fly/bin/flyctl /usr/local/bin/flyctl

      - name: Authenticate flyctl
        run: |
          flyctl auth login --access-token "$FLY_API_TOKEN"

      - name: Create Fly app if missing
        run: |
          flyctl apps create ecg-demo --region sjc || true

      - name: Deploy to Fly from pushed image
        run: |
          flyctl version
          flyctl deploy --image ghcr.io/${{ toLower(github.repository_owner) }}/ecg-demo:${{ github.sha }} --app ecg-demo
