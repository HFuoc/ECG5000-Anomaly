name: Deploy to Fly

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          sudo mv ~/.fly/bin/flyctl /usr/local/bin/flyctl
      - name: Authenticate flyctl
        run: |
          flyctl auth login --access-token "$FLY_API_TOKEN"
      - name: Create Fly app if missing
        run: |
          flyctl apps create ecg-demo --region sjc || true
      - name: Deploy to Fly
        run: |
          flyctl version
          flyctl deploy --remote-only --app ecg-demo --config fly.toml
